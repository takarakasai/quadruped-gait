[package]
name = "quadruped-gait"
version = "0.1.0"
edition = "2024"
description = "Quadruped gait generation library (CHAMP-equivalent), built on misarta primitives"
license = "MIT OR Apache-2.0"

[dependencies]
nalgebra = "0.34.2"
misarta = { path = "../misarta" }
serde = { version = "1.0", features = ["derive"], optional = true }

[features]
default = []
serde = ["dep:serde"]

[dev-dependencies]
approx = "0.5"
